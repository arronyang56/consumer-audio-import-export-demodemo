name: Refresh Official Schedules

permissions:
  actions: write
  contents: write

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: official-schedule-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-schedule.txt

      - name: Install schedule parser
        run: python -m pip install --requirement requirements-schedule.txt

      - name: Set up browser-assisted official downloads
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Download public carrier PDFs through Chromium
        run: |
          node scripts/download-oocl-schedules.cjs \
            --manifest scripts/oocl-schedule-services.json \
            --output .schedule-downloads

      - name: Refresh validated OOCL snapshots
        run: |
          python scripts/refresh-schedule-database.py \
            --manifest scripts/oocl-schedule-services.json \
            --output site/generated-schedule-records.js \
            --input-dir .schedule-downloads

      - name: Validate generated JavaScript
        run: |
          node --check site/generated-schedule-records.js
          node --check site/schedule-database.js
          node --check site/app.js
          node --check netlify/functions/schedule-records.js
          node --check scripts/download-oocl-schedules.cjs
          node scripts/intelligence-quality-self-test.js

      - name: Commit a changed last-good snapshot
        id: commit
        run: |
          if git diff --quiet -- site/generated-schedule-records.js; then
            echo "Official source returned no newer validated snapshot; keeping the last good file."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "logismaster-schedule-bot"
          git config user.email "logismaster-schedule-bot@users.noreply.github.com"
          git add site/generated-schedule-records.js
          git commit -m "data: refresh official carrier schedules"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy the validated snapshot
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-production.yml --ref main
